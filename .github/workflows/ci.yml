name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run rules and engine tests
        run: make test
      - name: Run AddressSanitizer and UBSan
        run: make test-sanitize

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19
      - name: Build Cardputer-Adv firmware
        run: pio run
